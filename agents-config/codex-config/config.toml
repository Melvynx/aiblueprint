# Codex CLI defaults installed by aiblueprint-cli.
# Existing user config is merged, not overwritten. If you already have a
# [tui].status_line configured, aiblueprint keeps your own statusline.

approval_policy = "never"
sandbox_mode = "danger-full-access"

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "/usr/bin/env node \"$HOME/.codex/hooks/command-deny-list.ts\""
timeout = 5
statusMessage = "Checking command safety"

[tui]
status_line = [
  "model-with-reasoning",
  "run-state",
  "project-name",
  "git-branch",
  "branch-changes",
  "context-remaining",
  "used-tokens",
  "five-hour-limit",
  "weekly-limit",
  "task-progress",
]
status_line_use_colors = true
